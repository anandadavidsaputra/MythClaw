<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mythic Claw Machine - Spin</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/navbar.css" />
  </head>
  <body>
    <div class="tab-nav">
      <a href="index.html">Spin</a>
      <a href="koleksi.html">Koleksi</a>
      <a href="quest.html">Quest</a>
    </div>

    <div class="machine">
      <div class="machine-roof">
        <div class="roof-triangle"></div>
        <div class="roof-title">MYTHIC CLAW</div>
      </div>

      <div class="glass-area">
        <div class="starry-bg"></div>
        <div class="mountains">
          <div class="mountain m-back"></div>
          <div class="mountain m-left"></div>
          <div class="mountain m-right"></div>
        </div>

        <div class="claw-container">
          <div class="chain"></div>
          <img src="assets/claw.png" class="claw" alt="claw" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        </div>

        <div class="object">
          <div class="orb-glow"></div>
        </div>
      </div>

      <div class="machine-base">
        <button id="gachaBtn">SUMMON</button>
      </div>
    </div>

   <div class="result-card" id="resultCard">
    <span class="close-btn" onclick="document.getElementById('resultCard').classList.remove('show')">&times;</span>
    <div class="card-decoration" id="cardDecoration">✨ NEW UNLOCK! ✨</div>
    
    <div class="card-image-wrapper">
        <img id="cardImg" src="" alt="Karakter" />
    </div>
    
    <h2 id="cardName"></h2>
    <p id="cardDesc"></p>
    <p id="cardCulture"></p>
    <p id="cardTier"></p>
    
    <button class="claim-btn" onclick="document.getElementById('resultCard').classList.remove('show')">KLAIM</button>
</div>

    <script src="data.js"></script>
    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
  </body>
</html>
